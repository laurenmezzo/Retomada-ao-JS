<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Coisas legais JS</title>
    <link rel="stylesheet" href="rets.css">
</head>
<body>
    <header>
        <h1>Coisas legais que dá pra fazer com JavaScript</h1>
    </header>
    <main>
        <ol>
            <li>
                <h2>Exibir seus dados pessoais.</h2>
                <p id="confid">Informação classificada.</p>
            </li>
            <li>
                <h2>Trocar o chapéu.</h2>
                <button id="trocaChapeu">Clique aqui</button>
                <div class="Mario" id="chapeu">
                    <div>
                        <h3 id="chapeuLetra" class="Mario">M</h3>
                    </div>
                </div>
            </li>
            <li>
                <h2>Descobrir qual será sua idade daqui a 365 dias.</h2>
                <form action="" method="get">
                    <input type="text" placeholder="Digite sua idade:" id="input">
                </form>
                <button id="mais1" value="submit">Pegue seu resultado</button>
                <p>Resultado:</p>
                <span id="span"></span>
            </li>
            <li>
                <h2>Criar esferas.</h2>
                <button id="addEsferas">Adicionar esfera</button>
                <span id="alertas">Sem esferas</span>
                <div id="agrupaEsferas"></div>
            </li>
        </ol>
    </main>
    <script src="rets.js"></script>
</body>
</html>
